<!DOCTYPE html>
<html lang="ko" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스튜디오 | ART CENTER ART HOUSE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <link rel="stylesheet" href="assets/css/common.css">
    <link rel="stylesheet" href="assets/css/studio.css">
</head>
<body class="antialiased studio-page studio-detail-page" data-page="studio">

    <nav id="navbar" class="fixed w-full z-50 transition-all duration-300 py-6 px-6 md:px-12 border-b border-transparent">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="home.html" class="logo-badge z-50">
                <img src="assets/logo-square.png" alt="ART CENTER ART HOUSE">
            </a>
            <div class="nav-menu hidden md:flex items-center text-sm font-medium tracking-wide">
                <a href="home.html#about" data-nav="home" class="nav-link transition-colors">회사소개</a>
                <span class="nav-dot">·</span>
                <a href="studio.html" data-nav="studio" class="nav-link transition-colors">스튜디오</a>
                <span class="nav-dot">·</span>
                <a href="portfolio.html" data-nav="portfolio" class="nav-link transition-colors">PORTFOLIO</a>
                <span class="nav-dot">·</span>
                <a href="location.html" data-nav="location" class="nav-link transition-colors">오시는길</a>
                <span class="nav-dot">·</span>
                <a href="contact.html" data-nav="contact" class="nav-link transition-colors">CONTACT</a>
            </div>
            <button class="md:hidden z-50 text-gray-800 focus:outline-none" onclick="toggleMobileMenu()">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
            </button>
        </div>
        <div id="mobile-menu" class="fixed inset-0 flex flex-col items-center justify-center space-y-8 text-xl font-bold tracking-widest opacity-0 pointer-events-none transition-opacity duration-300 z-40">
            <a href="home.html#about" onclick="toggleMobileMenu()">회사소개</a>
            <a href="studio.html" onclick="toggleMobileMenu()">스튜디오</a>
            <a href="portfolio.html" onclick="toggleMobileMenu()">PORTFOLIO</a>
            <a href="location.html" onclick="toggleMobileMenu()">오시는길</a>
            <a href="contact.html" onclick="toggleMobileMenu()">CONTACT</a>
        </div>
    </nav>

    <header class="studio-detail-bar">
        <p class="studio-detail-brand">art center &amp; art house commercial art studio</p>
        <nav class="studio-detail-tabs-wrap" aria-label="스튜디오 선택">
            <a href="studio.html" class="studio-detail-tab studio-detail-tab--map">배치도</a>
            <ul class="studio-detail-tabs" id="studio-detail-tabs"></ul>
        </nav>
        <span class="studio-preview-label">studio preview</span>
    </header>

    <div class="studio-hero studio-hero--detail studio-img-wrapper">
        <img id="detail-hero-img" src="" alt="">
    </div>

    <section class="studio-detail-split">
        <div class="studio-detail-info">
            <h1 class="studio-detail-title" id="detail-title">스튜디오</h1>
            <p class="studio-detail-lead" id="detail-lead"></p>
            <dl class="studio-spec-list studio-detail-specs" id="detail-specs"></dl>
        </div>
        <div class="studio-detail-plan">
            <img id="detail-layout-img" src="" alt="배치도">
        </div>
    </section>

    <section class="studio-info-box" id="detail-info-box" hidden>
        <div class="studio-info-box__text">
            <p class="studio-info-box__label">information</p>
            <h2 class="studio-info-box__title" id="detail-info-title"></h2>
        </div>
        <div class="studio-info-box__diagram">
            <img id="detail-info-img" src="" alt="">
        </div>
    </section>

    <div id="detail-gallery" class="studio-detail-gallery"></div>

    <section class="studio-map-section">
        <div class="studio-map-inner">
            <div class="studio-portfolio-section">
                <p class="studio-portfolio-heading">portfolio</p>
                <div class="studio-filters" id="studio-filters"></div>
                <div id="studio-portfolio-slider"></div>
            </div>
        </div>
    </section>

    <section class="studio-detail-closing">
        <p class="studio-detail-closing__lead">무엇이든 가능한 최적의 공간</p>
        <h2 class="studio-detail-closing__title">ART CENTER ART HOUSE</h2>
        <p class="studio-detail-closing__tags" id="detail-tags"></p>
    </section>

    <footer class="studio-page-footer pt-20 pb-12 px-6 md:px-12">
        <div class="max-w-7xl mx-auto text-xs text-gray-600 border-t border-gray-900 pt-8">
            <p>&copy; 2025 (주)일산아트센터 ART CENTER ART HOUSE. All rights reserved.</p>
        </div>
    </footer>

    <div class="studio-lightbox" id="studio-lightbox" role="dialog" aria-modal="true" aria-label="이미지 보기">
        <button type="button" class="studio-lightbox-close" aria-label="닫기">&times;</button>
        <img src="" alt="">
        <p class="studio-lightbox-title"></p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="assets/js/supabase-config.js"></script>
    <script src="assets/js/supabase-client.js"></script>
    <script src="assets/js/common.js"></script>
    <script src="assets/js/studio-data.js"></script>
    <script src="assets/js/studio-detail.js"></script>
</body>
</html>
